x-nullclaw-build: &nullclaw-build
  context: .
  dockerfile: Dockerfile
  target: ${NULLCLAW_DOCKER_TARGET:-release}
  args:
    ZIG_VERSION: "0.16.0"
    VERSION: ${NULLCLAW_VERSION:-dev}

services:
  init-data:
    image: alpine:3.23
    profiles: ["agent", "gateway"]
    command: ["sh", "-lc", "chown -R 65534:65534 /nullclaw-data"]
    volumes:
      - nullclaw-data:/nullclaw-data
    restart: "no"

  agent:
    image: ${NULLCLAW_IMAGE:-nullclaw:local}
    build: *nullclaw-build
    profiles: ["agent"]
    depends_on:
      init-data:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    command: ["agent"]
    env_file:
      - path: .env
        required: false
    volumes:
      - nullclaw-data:/nullclaw-data
    restart: unless-stopped

  gateway:
    image: ${NULLCLAW_IMAGE:-nullclaw:local}
    build: *nullclaw-build
    profiles: ["gateway"]
    depends_on:
      init-data:
        condition: service_completed_successfully
    command: ["gateway", "--port", "${NULLCLAW_PORT:-3210}", "--host", "0.0.0.0"]
    ports:
      - "0.0.0.0:${NULLCLAW_PORT:-3210}:${NULLCLAW_PORT:-3210}"
    env_file:
      - path: .env
        required: false
    volumes:
      - nullclaw-data:/nullclaw-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${NULLCLAW_PORT:-3210}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nullclaw-data:
